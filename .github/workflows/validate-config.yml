name: Validate Monitor Configuration

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate monitors.json syntax
        run: jq empty monitors.json

      - name: Validate required fields
        run: |
          invalid_count=$(jq '[.[] | select(.id == null or .name == null or .url == null or .keyword == null)] | length' monitors.json)

          if [ "$invalid_count" -ne 0 ]; then
          echo "❌ Error: $invalid_count monitor(s) missing required fields (id, name, url, keyword)"
          jq '.[] | select(.id == null or .name == null or .url == null or .keyword == null)' monitors.json
          exit 1
          fi

          echo "✅ All monitor entries contain required fields"

      - name: Success
        run: echo "Monitor configuration validated successfully"